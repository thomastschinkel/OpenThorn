<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-512.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="alternate" type="application/rss+xml" title="OpenThorn Blog" href="https://www.openthorn.app/rss.xml" />
    <meta name="description" content="OpenThorn is the BYOK AI website builder — describe what you want, get a complete, deployable website. No subscription, no lock-in." />
    <title>OpenThorn — The BYOK AI Website Builder</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.openthorn.app/" />
    <meta property="og:title" content="OpenThorn — The BYOK AI Website Builder" />
    <meta property="og:description" content="Describe what you want, get a complete, deployable website. Bring your own API key — no subscription, no lock-in." />
    <meta property="og:image" content="https://www.openthorn.app/og-card.png" />
    <meta property="og:site_name" content="OpenThorn" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OpenThorn — The BYOK AI Website Builder" />
    <meta name="twitter:description" content="Describe what you want, get a complete, deployable website. Bring your own API key — no subscription, no lock-in." />
    <meta name="twitter:image" content="https://www.openthorn.app/og-card.png" />

    <!-- Sitewide structured data: Organization + WebSite (per-page schemas are
         injected at runtime via useJsonLd and at build time via scripts/prerender.mjs) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "OpenThorn",
        "url": "https://www.openthorn.app",
        "logo": "https://www.openthorn.app/logo.png",
        "sameAs": ["https://github.com/BuildingTechAlternatives/OpenThorn"]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "OpenThorn",
        "url": "https://www.openthorn.app"
      }
    </script>

    <!-- Fonts are self-hosted via Fontsource (imported in src/main.tsx) — no external font requests -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
